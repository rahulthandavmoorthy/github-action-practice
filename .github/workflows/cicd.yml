name: VICD

on: 
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the Code
        run: echo "Building using Docker"
  build:
    needs: [code]
      runs-on: ubuntu-latest
      steps: 
        - name: Running test cases
          run: echo "Testing the app"

  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Running test case
        run: echo "Testing the app"

  deploy:
    needs: [build, test]
     runs-on: ubuntu-latest
     steps:
       - name: Deploying on the machine
         run: echo "Deploy the code"
       
        
      
